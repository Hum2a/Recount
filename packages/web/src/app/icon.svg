<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2A4A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#A5B4FC"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgGlow)"/>

  <g opacity="0.07" fill="#6366F1">
    <circle cx="100" cy="100" r="1.2"/><circle cx="200" cy="100" r="1.2"/><circle cx="300" cy="100" r="1.2"/>
    <circle cx="100" cy="200" r="1.2"/><circle cx="300" cy="200" r="1.2"/>
    <circle cx="100" cy="300" r="1.2"/><circle cx="200" cy="300" r="1.2"/><circle cx="300" cy="300" r="1.2"/>
  </g>

  <ellipse cx="200" cy="195" rx="100" ry="100" fill="#3B82F6" opacity="0.07" filter="url(#softGlow)"/>

  <rect x="82" y="72" width="236" height="236" rx="46" ry="46" fill="url(#cardGrad)"/>
  <rect x="82" y="72" width="236" height="236" rx="46" ry="46" fill="none" stroke="#2D3A5C" stroke-width="1.5"/>
  <rect x="83" y="73" width="234" height="234" rx="45" ry="45" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="154" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#4B5563" letter-spacing="1.5">GOAL</text>
  <text x="248" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#4B5563" letter-spacing="1.5">REAL</text>

  <line x1="200" y1="120" x2="200" y2="228" stroke="#1F2D4A" stroke-width="1" stroke-dasharray="3,4"/>

  <rect x="112" y="140" width="76" height="9" rx="4.5" fill="#152036"/>
  <rect x="112" y="140" width="76" height="9" rx="4.5" fill="url(#accentGrad)" filter="url(#glow)"/>
  <rect x="208" y="140" width="76" height="9" rx="4.5" fill="#152036"/>
  <rect x="208" y="140" width="28" height="9" rx="4.5" fill="url(#redGrad)" filter="url(#glow)"/>

  <rect x="112" y="162" width="76" height="9" rx="4.5" fill="#152036"/>
  <rect x="112" y="162" width="58" height="9" rx="4.5" fill="url(#accentGrad)" filter="url(#glow)"/>
  <rect x="208" y="162" width="76" height="9" rx="4.5" fill="#152036"/>
  <rect x="208" y="162" width="52" height="9" rx="4.5" fill="url(#redGrad)" filter="url(#glow)"/>

  <rect x="112" y="184" width="76" height="9" rx="4.5" fill="#152036"/>
  <rect x="112" y="184" width="70" height="9" rx="4.5" fill="url(#accentGrad)" filter="url(#glow)"/>
  <rect x="208" y="184" width="76" height="9" rx="4.5" fill="#152036"/>
  <rect x="208" y="184" width="14" height="9" rx="4.5" fill="url(#redGrad)" filter="url(#glow)"/>

  <g transform="translate(200, 228)">
    <path d="M -44,4 A 44,16 0 0,0 44,4" fill="none" stroke="url(#accentGrad)" stroke-width="2.2" stroke-linecap="round" filter="url(#glow)"/>
    <polygon points="44,4 36,-3 37,11" fill="#6366F1" filter="url(#glow)"/>
    <polygon points="-44,4 -36,-3 -37,11" fill="#3B82F6" filter="url(#glow)"/>
  </g>

  <text
    x="200" y="352"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="30"
    font-weight="900"
    letter-spacing="7"
    fill="url(#wordGrad)"
  >RECOUNT</text>

  <rect x="164" y="362" width="72" height="2.5" rx="1.25" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
