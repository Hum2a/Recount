<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Recount — Options</title>
    <style>
      body {
        font: 14px system-ui, sans-serif;
        max-width: 560px;
        margin: 24px;
        color: #18181b;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      input,
      textarea {
        width: 100%;
        margin-top: 6px;
        padding: 8px;
      }
      button {
        margin-top: 16px;
        padding: 10px 16px;
      }
      .hint {
        color: #52525b;
        font-size: 12px;
        margin-top: 4px;
      }
      .install-row {
        font-size: 13px;
        color: #3f3f46;
        margin-bottom: 16px;
        padding: 10px 12px;
        background: #f4f4f5;
        border-radius: 8px;
        border: 1px solid #e4e4e7;
      }
      .row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }
      .row-actions button {
        margin-top: 0;
        font-size: 12px;
        padding: 6px 10px;
      }
    </style>
  </head>
  <body>
    <h1>Recount options</h1>
    <p id="install-row" class="install-row">Detecting install…</p>
    <label for="apiUrl">API base URL</label>
    <input id="apiUrl" type="url" placeholder="" />
    <p class="hint">
      Leave blank to use the default for your install (localhost for unpacked, production URL for store). No trailing
      slash.
    </p>
    <div class="row-actions">
      <button type="button" id="use-local-default">Use local default</button>
      <button type="button" id="use-store-default">Use store default</button>
    </div>
    <label for="blocked">Blocked domains (one per line)</label>
    <textarea id="blocked" rows="6" placeholder="bank.example.com"></textarea>
    <p class="hint">These hostnames are never tracked.</p>
    <button type="button" id="save">Save</button>
    <p id="status"></p>
    <script type="module" src="options.js"></script>
  </body>
</html>
