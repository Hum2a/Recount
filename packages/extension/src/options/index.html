<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Recount — Options</title>
    <style>
      body {
        font: 14px system-ui, sans-serif;
        max-width: 560px;
        margin: 24px;
        color: #18181b;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      input,
      textarea {
        width: 100%;
        margin-top: 6px;
        padding: 8px;
      }
      button {
        margin-top: 16px;
        padding: 10px 16px;
      }
      .hint {
        color: #52525b;
        font-size: 12px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Recount options</h1>
    <label for="apiUrl">API base URL</label>
    <input id="apiUrl" type="url" placeholder="http://localhost:3001" />
    <p class="hint">Must match your Recount API (no trailing slash).</p>
    <label for="blocked">Blocked domains (one per line)</label>
    <textarea id="blocked" rows="6" placeholder="bank.example.com"></textarea>
    <p class="hint">These hostnames are never tracked.</p>
    <button type="button" id="save">Save</button>
    <p id="status"></p>
    <script type="module" src="options.js"></script>
  </body>
</html>
