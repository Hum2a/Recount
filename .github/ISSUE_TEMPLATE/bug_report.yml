name: Bug report
description: Something is broken or behaves incorrectly
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please avoid pasting secrets, tokens, or full `.env` contents.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong in one or two sentences?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps / what you clicked / what API you called
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Error messages, HTTP status, screenshots (redact PII)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web (Next.js)
        - API (Express)
        - Chrome extension
        - CI / build
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment (optional)
      description: OS, Node version, browser/extension channel
      placeholder: e.g. Windows 11, Node 22, Chrome 130
